<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online File Converter</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Online File Converter</h1>
    <p>Convert your files easily and securely — built by Emmanuel MUKIZA</p>
  </header>
  <main>
    <div class="converter-box">
      <div class="input-row">
        <label for="fileInput" class="custom-file-label">Choose File</label>
        <input type="file" id="fileInput">
        <span id="fileName">No file chosen</span>
        <select id="formatSelect" class="format-select">
          <option value="pdf">PDF</option>
          <option value="jpg">JPG</option>
          <option value="png">PNG</option>
          <option value="docx">Word (DOCX)</option>
        </select>
        <button id="convertBtn" class="convert-btn">Convert</button>
      </div>
      <div id="result"></div>
    </div>
  </main>
  <footer>
    <p>© 2026 Emmanuel MUKIZA | Hosted on GitHub</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
