<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    My Profile | Online File Converter
  </title>

  <!-- Website favicon -->
<link
  rel="icon"
  type="image/png"
  href="favicon.png"
>

<link
  rel="shortcut icon"
  href="favicon.png"
>

<link
  rel="apple-touch-icon"
  href="favicon.png"
>

  <link
    rel="stylesheet"
    href="style.css"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css"
  >
</head>

<body>

<!-- =====================================
Navigation
===================================== -->

<nav class="top-nav">

  <div class="nav-left">

    <a
      href="index.html"
      class="nav-link"
    >
      <i class="fa-solid fa-table-columns"></i>
      Dashboard
    </a>

    <a
      href="projects.html"
      class="nav-link"
    >
      <i class="fa-solid fa-diagram-project"></i>
      Other Projects
    </a>

    <a
      href="about.html"
      class="nav-link"
    >
      <i class="fa-solid fa-circle-info"></i>
      About & Support
    </a>

  </div>

  <div class="nav-right">

    <a
      href="profile.html"
      class="nav-link active"
    >
      <i class="fa-solid fa-circle-user"></i>
      My Profile
    </a>

  </div>

</nav>

<!-- =====================================
Header
===================================== -->

<header>

  <h1>
    My Profile
  </h1>

  <p class="subtitle">
    Manage your account and security settings.
  </p>

</header>

<!-- =====================================
Main Profile Area
===================================== -->

<main class="dashboard">

  <div
    class="converter-box"
    style="
      width:min(96%,1000px);
      padding:0;
      overflow:hidden;
    "
  >

    <div
      style="
        display:flex;
        flex-wrap:wrap;
      "
    >

      <!-- ==========================
      LEFT SIDEBAR
      =========================== -->

      <aside
        style="
          width:260px;
          background:
            rgba(255,255,255,0.06);
          padding:30px;
        "
      >

        <!-- Profile Picture -->

        <div
          style="
            text-align:center;
            margin-bottom:30px;
          "
        >

          <img
            id="profileImage"
            src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
            alt="Profile"
            style="
              width:120px;
              height:120px;
              border-radius:50%;
              object-fit:cover;
              display:block;
              margin:auto;
              margin-bottom:15px;
            "
          >

          <input
            type="file"
            id="profilePhotoInput"
            accept="image/*"
          >

          <h3
            id="profileUsername"
            style="
              margin-top:20px;
            "
          >
            User
          </h3>

        </div>

        <!-- Tabs -->

        <a
          href="#"
          class="support-link"
          id="accountTab"
        >
          <i class="fa-solid fa-user"></i>
          Account
        </a>

        <a
          href="#"
          class="support-link"
          id="securityTab"
        >
          <i class="fa-solid fa-shield-halved"></i>
          Security
        </a>

      </aside>

      <!-- ==========================
      RIGHT CONTENT
      =========================== -->

      <section
        style="
          flex:1;
          min-width:300px;
          padding:35px;
        "
      >

        <!-- ACCOUNT PANEL -->

        <div id="accountPanel">

          <h2>
            Account Information
          </h2>

          <br>

          <label>
            Email
          </label>

          <input
            type="email"
            id="profileEmail"
          >

          <br><br>

          <label>
            Username
          </label>

          <input
            type="text"
            id="profileUsernameInput"
          >

          <br><br>

          <button
            class="convert-btn"
            id="saveAccountBtn"
          >
            Save Changes
          </button>

        </div>

        <!-- SECURITY PANEL -->

        <div
          id="securityPanel"
          style="display:none;"
        >

          <h2>
            Security Settings
          </h2>

          <br>

          <label>
            Current Password
          </label>

          <input
            type="password"
            id="currentPassword"
          >

          <br><br>

          <label>
            New Password
          </label>

          <input
            type="password"
            id="newPassword"
          >

          <br><br>

          <label>
            Confirm Password
          </label>

          <input
            type="password"
            id="confirmPassword"
          >

          <br><br>

          <button
            class="convert-btn"
            id="changePasswordBtn"
          >
            Change Password
          </button>

          <br><br><br>

          <button
            class="convert-btn"
            id="logoutBtn"
            style="
              background:#ff9800;
            "
          >
            Log Out
          </button>

          <br><br>

          <button
            class="convert-btn"
            id="deleteAccountBtn"
            style="
              background:#e53935;
            "
          >
            Delete Account
          </button>

        </div>

        <!-- Messages -->

        <div
          id="profileMessage"
          style="
            margin-top:30px;
          "
        ></div>

      </section>

    </div>

  </div>

</main>

<footer>

  <div class="copyright">
    © 2026 Emmanuel MUKIZA
  </div>

</footer>

<script src="profile.js"></script>

</body>
</html>
