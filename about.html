  <!-- ============================================
       NAVIGATION AUTH SCRIPT
       ============================================ -->
  <!-- Immediately Invoked Function Expression (IIFE) to handle navigation auth -->
  <!-- Checks if user is logged in and displays appropriate nav elements -->
  <script>
  (function() {
    try {
      // Get logged-in user email from localStorage
      const loggedInEmail = localStorage.getItem("loggedInUser");
      const users = JSON.parse(localStorage.getItem("users")) || [];
      const user = users.find((u) => u.email === loggedInEmail);
      
      // Try to get user data from localStorage first, then from database
      let userData = null;
      try {
        userData = JSON.parse(localStorage.getItem("userData"));
      } catch(e) {}
      
      // Get navigation elements
      const guestNav = document.getElementById("guestNav");
      const profileNav = document.getElementById("profileNav");
      const navUsername = document.getElementById("navUsername");
      const navProfilePhoto = document.getElementById("navProfilePhoto");
      
      // Default profile icon if no photo is available
      const DEFAULT_ICON = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

      // CASE 1: User is logged in AND userData is available in localStorage
      if (loggedInEmail && userData) {
        // Show profile navigation with user data
        if (guestNav) guestNav.style.display = "none"; // Hide Sign In/Sign Up
        if (profileNav) {
          profileNav.style.display = "flex"; // Show profile
          profileNav.style.alignItems = "center";
        }
        // Update username and photo from cached data
        if (navUsername) navUsername.textContent = userData.username || 'Profile';
        if (navProfilePhoto) {
          navProfilePhoto.src = userData.photo || DEFAULT_ICON;
        }
      } 
      // CASE 2: User is logged in but userData not in localStorage
      else if (loggedInEmail) {
        // Fetch user data from server API
        fetch("/api/get-user", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: loggedInEmail })
        })
        .then(res => res.json())
        .then(data => {
          // Cache user data in localStorage for future use
          localStorage.setItem("userData", JSON.stringify(data));
          // Update navigation with fetched data
          if (navUsername) navUsername.textContent = data.username || 'Profile';
          if (navProfilePhoto) navProfilePhoto.src = data.photo || DEFAULT_ICON;
          if (guestNav) guestNav.style.display = "none";
          if (profileNav) {
            profileNav.style.display = "flex";
            profileNav.style.alignItems = "center";
          }
        })
        .catch(err => console.error("Failed to load user data:", err));
      } 
      // CASE 3: User is NOT logged in (guest)
      else {
        // Show guest navigation (Sign In / Sign Up)
        if (guestNav) {
          guestNav.style.display = "flex";
          guestNav.style.alignItems = "center";
          guestNav.style.gap = "8px";
        }
        // Hide profile navigation
        if (profileNav) {
          profileNav.style.display = "none";
        }
      }
    } catch (error) {
      // Error handling: fallback to showing guest navigation
      console.error("Navigation error:", error);
      const guestNav = document.getElementById("guestNav");
      if (guestNav) {
        guestNav.style.display = "flex";
        guestNav.style.alignItems = "center";
        guestNav.style.gap = "8px";
      }
      const profileNav = document.getElementById("profileNav");
      if (profileNav) profileNav.style.display = "none";
    }
  })();
</script>
